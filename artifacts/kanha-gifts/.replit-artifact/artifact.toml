kind = "web"
previewPath = "/kanha-gifts/"
title = "Kanha Gifts"
version = "1.0.0"
id = "artifacts/kanha-gifts"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/kanha-gifts/" ]
localPort = 19675

[services.development]
run = "pnpm --filter @workspace/kanha-gifts run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kanha-gifts", "run", "build" ]
publicDir = "artifacts/kanha-gifts/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19675"
BASE_PATH = "/kanha-gifts/"
